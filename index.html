<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#F9A8C9" />
<meta name="description" content="A gentle, zero-guilt postpartum wellness planner — track your weight, nutrition, movement, mood and sleep at your own pace." />
<title>Mama Reset — Postpartum Weight Loss Planner</title>
<!-- PWA: installable on phones & desktops -->
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Mama Reset" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root{
  --primary:#F9A8C9;
  --primary-soft:#FDE3EE;
  --secondary:#A8C5A0;
  --secondary-soft:#E4EFE0;
  --accent:#F4E4BC;
  --bg:#FFF8F5;
  --card:#FFFFFF;
  --text:#3D2C2C;
  --text-soft:#8B6F6F;
  --success:#A8C5A0;
  --warning:#F4C896;
  --danger:#E89B9B;
  --border:#F0E0D6;
  --shadow:0 4px 20px rgba(249,168,201,0.15);
  --shadow-lg:0 10px 40px rgba(249,168,201,0.22);
  --radius-card:16px;
  --radius-btn:12px;
  --ring-track:#F3E6E0;
}
[data-theme="dark"]{
  --primary:#F9A8C9;
  --primary-soft:#3A2630;
  --secondary:#A8C5A0;
  --secondary-soft:#26302A;
  --accent:#5A4A35;
  --bg:#1E1518;
  --card:#2A1F23;
  --text:#F5E6E8;
  --text-soft:#C4A4A8;
  --border:#3E2E33;
  --shadow:0 4px 20px rgba(0,0,0,0.35);
  --shadow-lg:0 10px 40px rgba(0,0,0,0.45);
  --ring-track:#3E2E33;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.5;
  transition:background .3s ease,color .3s ease;
  overflow-x:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:1rem;color:var(--text)}
::placeholder{color:var(--text-soft);opacity:.7}
::-webkit-scrollbar{height:6px;width:6px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

/* ---------- Layout shell ---------- */
.app-header{
  position:sticky;top:0;z-index:40;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;
  background:var(--card);
  border-bottom:1px solid var(--border);
  box-shadow:var(--shadow);
}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:1.15rem}
.brand .flower{
  width:34px;height:34px;border-radius:50%;
  display:grid;place-items:center;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:#fff;box-shadow:var(--shadow);
}
.brand .flower svg{width:20px;height:20px}
.header-actions{display:flex;gap:8px}
.icon-btn{
  width:42px;height:42px;border-radius:50%;
  display:grid;place-items:center;
  background:var(--bg);color:var(--text-soft);
  transition:.25s ease;
}
.icon-btn:hover{background:var(--primary-soft);color:var(--primary);transform:translateY(-1px)}
.icon-btn svg{width:20px;height:20px}

.layout{display:flex;min-height:100vh}
.side-nav{display:none}
.main-wrap{flex:1;min-width:0}
.screen-container{
  max-width:1100px;margin:0 auto;
  padding:18px 16px 110px;
}
.screen{display:none;animation:slideIn .35s ease}
.screen.active{display:block}
@keyframes slideIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}

/* ---------- Bottom nav ---------- */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  display:flex;justify-content:space-around;
  background:var(--card);
  border-top:1px solid var(--border);
  padding:8px 4px calc(8px + env(safe-area-inset-bottom));
  box-shadow:0 -4px 20px rgba(249,168,201,0.12);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 2px;border-radius:12px;
  color:var(--text-soft);font-size:.65rem;font-weight:600;
  transition:.25s ease;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;
}
.nav-item span:last-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
@keyframes navPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.nav-pulse{animation:navPulse .5s ease 2}
@media(max-width:360px){.nav-item span:last-child{font-size:.58rem}}
.nav-item svg{width:22px;height:22px}
.nav-item.active{color:var(--primary)}
.nav-item.active .nav-icon{
  background:var(--primary-soft);
}
.nav-icon{
  width:46px;height:30px;border-radius:14px;
  display:grid;place-items:center;transition:.25s ease;
}

/* ---------- Cards ---------- */
.card{
  background:var(--card);
  border-radius:var(--radius-card);
  padding:18px;
  box-shadow:var(--shadow);
  border:1px solid var(--border);
  margin-bottom:16px;
  animation:fadeUp .4s ease;
}
.card-title{display:flex;align-items:center;gap:8px;font-weight:700;font-size:1.02rem;margin-bottom:14px}
.card-title svg{width:18px;height:18px;color:var(--primary)}
.card-sub{font-size:.82rem;color:var(--text-soft);margin-top:-8px;margin-bottom:12px}
.muted{color:var(--text-soft)}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-head h2{font-size:1.3rem;font-weight:700}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  padding:12px 18px;border-radius:var(--radius-btn);
  font-weight:600;font-size:.92rem;
  background:var(--primary);color:#fff;
  transition:.25s ease;box-shadow:var(--shadow);
}
.btn:hover{filter:brightness(1.04);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn svg{width:18px;height:18px}
.btn-block{width:100%}
.btn-secondary{background:var(--secondary)}
.btn-ghost{background:var(--bg);color:var(--text);border:1px solid var(--border);box-shadow:none}
.btn-ghost:hover{background:var(--primary-soft)}
.btn-sm{padding:8px 12px;font-size:.82rem}
.btn-danger{background:var(--danger)}
.chip-row{display:flex;gap:8px;flex-wrap:wrap}
.chip{
  padding:7px 14px;border-radius:999px;font-size:.82rem;font-weight:600;
  background:var(--bg);color:var(--text-soft);border:1px solid var(--border);
  transition:.2s ease;
}
.chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* ---------- Forms ---------- */
.field{margin-bottom:13px}
.field label{display:block;font-size:.82rem;font-weight:600;margin-bottom:6px;color:var(--text-soft)}
.input,select.input,textarea.input{
  width:100%;padding:12px 14px;border-radius:var(--radius-btn);
  border:1px solid var(--border);background:var(--bg);color:var(--text);
  transition:.2s ease;outline:none;
}
.input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
textarea.input{resize:vertical;min-height:64px}
.input-row{display:flex;gap:8px}
.input-row .input{flex:1}
.toggle-group{display:inline-flex;background:var(--bg);border:1px solid var(--border);border-radius:999px;padding:4px;gap:2px}
.toggle-group button{padding:7px 14px;border-radius:999px;font-weight:600;font-size:.82rem;color:var(--text-soft);transition:.2s}
.toggle-group button.active{background:var(--primary);color:#fff}

/* switch */
.switch{position:relative;display:inline-block;width:48px;height:27px}
.switch input{display:none}
.switch .track{position:absolute;inset:0;background:var(--border);border-radius:999px;transition:.25s}
.switch .thumb{position:absolute;top:3px;left:3px;width:21px;height:21px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.switch input:checked + .track{background:var(--secondary)}
.switch input:checked + .track + .thumb,.switch input:checked ~ .thumb{transform:translateX(21px)}

/* ---------- Progress rings ---------- */
.rings-row{display:flex;gap:14px;overflow-x:auto;padding:4px 2px 8px;scroll-snap-type:x mandatory}
.ring-card{
  flex:0 0 auto;min-width:120px;scroll-snap-align:start;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius-card);
  padding:16px 14px;text-align:center;box-shadow:var(--shadow);cursor:pointer;transition:.25s;
}
.ring-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.ring-wrap{position:relative;width:84px;height:84px;margin:0 auto 8px}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-center .val{font-weight:700;font-size:1rem;line-height:1}
.ring-center .lbl{font-size:.6rem;color:var(--text-soft)}
.ring-card .name{font-weight:600;font-size:.85rem}
.ring-card .detail{font-size:.72rem;color:var(--text-soft)}

/* progress bar */
.pbar{height:12px;border-radius:999px;background:var(--ring-track);overflow:hidden;margin:8px 0}
.pbar > span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--primary),var(--secondary));transition:width .6s ease}
.pbar.macro > span{background:var(--primary)}
.macro-row{display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:3px}

/* ---------- Stats ---------- */
.stat-3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center}
.stat-3 .s-val{font-weight:700;font-size:1.05rem}
.stat-3 .s-lbl{font-size:.7rem;color:var(--text-soft)}
.big-weight{font-size:2.6rem;font-weight:800;line-height:1;color:var(--primary)}
.big-weight small{font-size:1rem;color:var(--text-soft);font-weight:600}

/* ---------- Welcome / quote ---------- */
.welcome-card{
  background:linear-gradient(135deg,var(--primary-soft),var(--accent));
  border:none;
}
[data-theme="dark"] .welcome-card{background:linear-gradient(135deg,#3A2630,#4A3A28)}
.welcome-card h1{font-size:1.4rem;font-weight:700}
.welcome-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:.82rem;color:var(--text-soft);margin-top:6px}
.welcome-meta b{color:var(--text)}
.quote{margin-top:12px;font-style:italic;font-size:.92rem;padding:12px 14px;background:rgba(255,255,255,.5);border-radius:12px;border-left:3px solid var(--primary)}
[data-theme="dark"] .quote{background:rgba(255,255,255,.08);color:var(--text);border-left-color:var(--primary)}

.tip-card{background:var(--primary-soft);border:1px dashed var(--primary)}
.tip-card p{font-style:italic;font-size:.95rem}

/* mood selector */
.mood-row{display:flex;justify-content:space-between;gap:6px}
.mood-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:10px 4px;border-radius:14px;font-size:1.7rem;
  background:var(--bg);border:2px solid transparent;transition:.2s;
}
.mood-btn .m-lbl{font-size:.62rem;color:var(--text-soft);font-weight:600}
.mood-btn:hover{background:var(--primary-soft)}
.mood-btn.active{background:var(--primary-soft);border-color:var(--primary);transform:scale(1.05)}

/* quick actions */
.qa-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.qa-btn{
  display:flex;align-items:center;gap:10px;padding:16px;border-radius:14px;
  background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);
  font-weight:600;font-size:.9rem;transition:.25s;text-align:left;
}
.qa-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);background:var(--primary-soft)}
.qa-btn .qa-ico{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:var(--primary-soft);color:var(--primary);flex-shrink:0}
.qa-btn .qa-ico svg{width:20px;height:20px}

/* streak */
.streak-row{display:flex;justify-content:space-between;gap:6px;margin-bottom:10px}
.streak-day{flex:1;text-align:center}
.streak-dot{width:34px;height:34px;border-radius:50%;margin:0 auto 4px;display:grid;place-items:center;background:var(--bg);border:2px solid var(--border);color:var(--text-soft);transition:.2s}
.streak-dot.on{background:var(--secondary);border-color:var(--secondary);color:#fff}
.streak-dot svg{width:16px;height:16px}
.streak-lbl{font-size:.62rem;color:var(--text-soft);font-weight:600}

/* ---------- water glasses ---------- */
.glasses{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.glass{
  width:38px;height:46px;border-radius:6px 6px 12px 12px;
  border:2px solid var(--primary);position:relative;overflow:hidden;cursor:pointer;transition:.2s;
  background:var(--bg);
}
.glass.full{background:linear-gradient(180deg,#bfe3f5,#7fc4e8)}
.glass:hover{transform:translateY(-2px)}
.glass svg{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:16px;height:16px;color:var(--primary);opacity:.5}
.glass.full svg{color:#fff;opacity:.9}

/* ---------- meal sections ---------- */
.meal-slot{border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:12px;background:var(--bg)}
.meal-slot-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.meal-slot-head .ms-title{display:flex;align-items:center;gap:7px;font-weight:700}
.meal-slot-head .ms-cal{font-size:.78rem;color:var(--text-soft)}
.meal-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--card);border-radius:10px;margin-bottom:6px;font-size:.88rem}
.meal-item .mi-cal{color:var(--text-soft);font-size:.8rem}
.meal-item button{color:var(--danger);display:grid;place-items:center}
.meal-item button svg{width:16px;height:16px}

/* list rows */
.list-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px;border-bottom:1px solid var(--border)}
.list-row:last-child{border-bottom:none}
.list-row .lr-main{font-weight:600;font-size:.92rem}
.list-row .lr-sub{font-size:.76rem;color:var(--text-soft)}
.del-btn{color:var(--danger);width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:var(--bg)}
.del-btn:hover{background:var(--primary-soft)}
.del-btn svg{width:17px;height:17px}

/* ---------- timeline ---------- */
.timeline{position:relative;padding-left:8px}
.tl-item{position:relative;padding:0 0 22px 34px}
.tl-item:before{content:"";position:absolute;left:11px;top:22px;bottom:-4px;width:2px;background:var(--border)}
.tl-item:last-child:before{display:none}
.tl-dot{position:absolute;left:0;top:0;width:24px;height:24px;border-radius:50%;background:var(--bg);border:2px solid var(--border);display:grid;place-items:center}
.tl-dot svg{width:13px;height:13px;color:var(--text-soft)}
.tl-item.done .tl-dot{background:var(--secondary);border-color:var(--secondary)}
.tl-item.done .tl-dot svg{color:#fff}
.tl-item.current .tl-dot{background:var(--primary);border-color:var(--primary);animation:pulse 1.8s infinite}
.tl-item.current .tl-dot svg{color:#fff}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(249,168,201,.5)}70%{box-shadow:0 0 0 8px rgba(249,168,201,0)}100%{box-shadow:0 0 0 0 rgba(249,168,201,0)}}
.tl-title{font-weight:700;font-size:.92rem}
.tl-sub{font-size:.76rem;color:var(--text-soft)}

/* ---------- phase banner ---------- */
.phase-banner{
  background:linear-gradient(135deg,var(--secondary-soft),var(--primary-soft));
  border:none;
}
.phase-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;background:var(--secondary);color:#fff;font-weight:700;font-size:.8rem;margin-bottom:8px}
.phase-name{font-size:1.25rem;font-weight:700}
.safe-list{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px}
.safe-list span{background:rgba(255,255,255,.55);padding:5px 10px;border-radius:999px;font-size:.76rem;font-weight:600}
[data-theme="dark"] .safe-list span{background:rgba(0,0,0,.25)}

/* accordion */
.acc{border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.acc-head{display:flex;align-items:center;justify-content:space-between;padding:14px;font-weight:700;background:var(--bg);transition:.2s}
.acc-head:hover{background:var(--primary-soft)}
.acc-head .chev{transition:.3s}
.acc.open .chev{transform:rotate(180deg)}
.acc-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.acc.open .acc-body{max-height:1400px}
.acc-body-inner{padding:6px 14px 14px}
.exercise{padding:10px 0;border-bottom:1px dashed var(--border)}
.exercise:last-child{border-bottom:none}
.exercise .ex-name{font-weight:700;font-size:.9rem;display:flex;justify-content:space-between}
.exercise .ex-name span{color:var(--secondary);font-size:.78rem;font-weight:600}
.exercise .ex-desc{font-size:.8rem;color:var(--text-soft)}

/* ---------- sub tabs ---------- */
.subtabs{display:flex;gap:6px;background:var(--card);padding:6px;border-radius:14px;border:1px solid var(--border);margin-bottom:16px;box-shadow:var(--shadow)}
.subtab{flex:1;padding:10px;border-radius:10px;font-weight:600;font-size:.85rem;color:var(--text-soft);transition:.2s}
.subtab.active{background:var(--primary);color:#fff}
.subscreen{display:none;animation:fadeUp .35s ease}
.subscreen.active{display:block}

/* sliders */
.slider-wrap{margin:8px 0}
.slider-wrap .sl-head{display:flex;justify-content:space-between;font-size:.85rem;font-weight:600;margin-bottom:4px}
input[type=range]{-webkit-appearance:none;width:100%;height:8px;border-radius:999px;background:var(--ring-track);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--primary);cursor:pointer;box-shadow:var(--shadow);border:3px solid #fff}
input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--primary);cursor:pointer;border:3px solid #fff}

/* stars */
.stars{display:flex;gap:6px;font-size:1.7rem}
.star{color:var(--border);cursor:pointer;transition:.15s}
.star.on{color:var(--warning)}
.star:hover{transform:scale(1.15)}

/* affirmation */
.affirm-card{background:linear-gradient(135deg,var(--accent),var(--primary-soft));border:none;text-align:center}
.affirm-card p{font-size:1.15rem;font-weight:600;font-style:italic;margin:8px 0 14px}

/* alert card */
.alert-soft{background:var(--primary-soft);border:1px solid var(--primary)}
.alert-soft .card-title{color:var(--primary)}

/* badges */
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.badge{
  text-align:center;padding:16px 10px;border-radius:14px;border:1px solid var(--border);
  background:var(--bg);transition:.25s;position:relative;
}
.badge.unlocked{background:var(--card);box-shadow:var(--shadow)}
.badge.locked{opacity:.45;filter:grayscale(.8)}
.badge .b-ico{font-size:2.1rem;margin-bottom:6px}
.badge .b-name{font-weight:700;font-size:.85rem}
.badge .b-desc{font-size:.7rem;color:var(--text-soft)}
.badge .b-date{font-size:.65rem;color:var(--secondary);font-weight:600;margin-top:4px}

/* measurement table */
.mtable{width:100%;border-collapse:collapse;font-size:.82rem}
.mtable th,.mtable td{padding:8px 6px;text-align:center;border-bottom:1px solid var(--border)}
.mtable th{color:var(--text-soft);font-weight:600;font-size:.72rem}
.mtable td:first-child,.mtable th:first-child{text-align:left}

/* empty state */
.empty{text-align:center;padding:26px 16px;color:var(--text-soft)}
.empty .e-ico{font-size:2.4rem;margin-bottom:8px}
.empty p{font-size:.9rem}

/* meal planner grid */
.planner-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.planner{border-collapse:collapse;width:100%;min-width:560px}
.planner th,.planner td{border:1px solid var(--border);padding:0;text-align:center;min-width:90px}
.planner th{background:var(--bg);font-size:.72rem;padding:8px 4px;font-weight:700}
.planner td .rowlbl{font-size:.72rem;font-weight:700;padding:8px;color:var(--text-soft);background:var(--bg)}

<body>

<script>
/* ============================================================
   MAMA RESET — Postpartum Weight Loss Planner
   ============================================================ */
"use strict";

const STORE_KEY = "mamaReset_data";

/* ---------- Content constants ---------- */
const QUOTES = [
  "Your body did something amazing. Be patient with its recovery. 🌸",
  "Progress, not perfection. Every small step counts, mama.",
  "Rest is productive. Healing is not a race.",
  "You are exactly the mother your baby needs today.",
  "Nourish yourself the way you nourish your little one. 💕",

  "Some days survival is the victory — and that's enough."
];
const TIPS = [

];
const AFFIRMATIONS = [
  "Your body grew a human. Be gentle with yourself.",
  "You are healing a little more every single day.",
  "I am a good mother, even on the hard days.",
  "My worth is not measured by a number on the scale.",
  "I deserve rest, nourishment, and kindness.",
  "Slow progress is still progress.",
  "I am learning, and that is enough.",
  "My body is strong and capable.",
  "I give myself grace today.",
  "Every step forward, however small, matters.",
  "I am proud of how far I've come.",
  "I trust my body's pace of healing."
];
const SLEEP_TIPS = [
  "Sleep when the baby sleeps — even short naps add up.",
  "Keep nights dark and calm to help everyone resettle faster.",
  "Tag-team night feeds with a partner when you can.",
  "A consistent wind-down helps your body relax, even with interruptions.",
  "Caffeine after 2pm can make fragmented sleep worse — go gentle."
];
const ACTIVITY_TYPES = ["Walk","Yoga","Pelvic Floor","Light Stretching","Postpartum Workout","Swimming","Other"];
// rough calories burned per minute by intensity
const INTENSITY_RATE = { Light:3.5, Moderate:5.5, Active:8 };

const PHASES = [
  { id:1, name:"Rest & Gentle Movement", range:"0–6 weeks", color:"var(--primary)",
    safe:["Deep breathing","Pelvic tilts","Gentle walks","Kegels"] },
  { id:2, name:"Light Rebuilding", range:"6–12 weeks", color:"var(--warning)",
    safe:["Bodyweight squats","Glute bridges","Modified planks","Walking 20–30 min"] },
  { id:3, name:"Getting Stronger", range:"3–6 months", color:"var(--secondary)",
    safe:["Light strength","Yoga flows","Swimming","Longer walks"] },
  { id:4, name:"Full Recovery Mode", range:"6+ months", color:"var(--secondary)",
    safe:["Running","Modified HIIT","Full strength","Dance classes"] }
];
const EXERCISE_GUIDE = [
  { phase:1, title:"Phase 1 · 0–6 Weeks", note:"Rest & gentle movement. Always get clearance at your 6-week checkup before more.", items:[
    {name:"Deep Breathing",meta:"5 min",desc:"Slow belly breaths to reconnect with your core and calm the nervous system."},
    {name:"Kegel Exercises",meta:"10 reps ×3",desc:"Gently contract pelvic floor, hold 3–5 sec, release. Rebuilds support."},
    {name:"Gentle Walks",meta:"10–15 min",desc:"Easy-pace strolls to boost circulation and mood."},
    {name:"Pelvic Tilts",meta:"10 reps",desc:"Lying down, gently tilt pelvis to engage deep abdominals."}
  ]},
  { phase:2, title:"Phase 2 · 6–12 Weeks", note:"Light rebuilding once cleared by your doctor.", items:[
    {name:"Bodyweight Squats",meta:"10–12 reps",desc:"Slow, controlled squats to rebuild leg & glute strength."},
    {name:"Modified Planks",meta:"15–20 sec",desc:"Knee planks to gently rebuild core without straining."},
    {name:"Glute Bridges",meta:"12–15 reps",desc:"Lift hips from the floor to strengthen glutes & core."},
    {name:"Brisk Walks",meta:"20–30 min",desc:"Pick up the pace as energy allows."}
  ]},
  { phase:3, title:"Phase 3 · 3–6 Months", note:"Getting stronger — build gradually.", items:[
    {name:"Light Strength Training",meta:"2–3×/week",desc:"Light dumbbells, full-body, focus on form."},
    {name:"Yoga Flows",meta:"20–40 min",desc:"Builds flexibility, strength and calm."},
    {name:"Swimming",meta:"20–30 min",desc:"Low-impact full-body cardio, easy on joints."},
    {name:"Longer Walks / Light Jog",meta:"30–45 min",desc:"Add gentle intervals if your body feels ready."}
  ]},
  { phase:4, title:"Phase 4 · 6+ Months", note:"Full recovery mode — listen to your body.", items:[
    {name:"Running",meta:"As able",desc:"Build distance gradually; ensure pelvic floor is ready."},
    {name:"Modified HIIT",meta:"15–25 min",desc:"Short bursts with recovery; scale to your level."},
    {name:"Full Strength",meta:"3×/week",desc:"Progressive resistance training, full body."},
    {name:"Dance / Classes",meta:"Fun cardio",desc:"Group classes for cardio and a mood boost."}
  ]}
];
const ACHIEVEMENT_DEFS = [
  { key:"firstLog", icon:"🌸", name:"First Log", desc:"Logged for the first time" },
  { key:"hydrationHero", icon:"💧", name:"Hydration Hero", desc:"7 days water goal met" },
  { key:"firstKilo", icon:"⚖️", name:"First Kilo", desc:"Lost your first 1kg" },
  { key:"weekWarrior", icon:"🔥", name:"Week Warrior", desc:"7-day logging streak" },
  { key:"monthStrong", icon:"💪", name:"Month Strong", desc:"30-day streak" },
  { key:"halfwayThere", icon:"🎯", name:"Halfway There", desc:"50% to goal weight" },
  { key:"goalReached", icon:"🏆", name:"Goal Reached", desc:"Hit your goal weight" }
];
const MOODS = [
  { v:1, e:"😔", l:"Struggling" },
  { v:2, e:"😐", l:"Okay" },
  { v:3, e:"🙂", l:"Good" },
  { v:4, e:"😊", l:"Great" },
  { v:5, e:"🌟", l:"Amazing" }
];
const DOW = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const GROCERY_CATS = ["Proteins","Veggies","Fruits","Dairy","Other"];

/* ---------- Default data ---------- */
function defaultData(){
  const planner = {};
  DOW.forEach(d => planner[d] = { breakfast:"", lunch:"", dinner:"" });
  const ach = {};
  ACHIEVEMENT_DEFS.forEach(a => ach[a.key] = false);
  return {
    profile:{ name:"", babyBirthDate:"", isBreastfeeding:"no", startWeight:null,
      goalWeight:null, unit:"kg", measureUnit:"cm", activityLevel:"light",
      currentEnergy:3, timeline:"gentle", reminderTime:"", setupComplete:false },
    weights:[], meals:{}, activities:[], mood:[], sleep:[], journal:[],
    measurements:[], achievements:ach, achievementDates:{}, mealPlanner:planner,
    groceryList:[], pelvicLog:[], steps:{}, theme:"light"
  };
}

/* ---------- State + persistence ---------- */
let DATA = loadData();
function loadData(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return defaultData();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultData(), parsed);
  }catch(e){ return defaultData(); }
}
function save(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(DATA)); }
  catch(e){ console.warn("save failed", e); }
}

/* ---------- Date helpers ---------- */
function todayKey(d){ d = d || new Date(); return d.toISOString().slice(0,10); }
function fmtDate(key){
  const d = new Date(key + "T00:00:00");
  return d.toLocaleDateString(undefined,{ month:"short", day:"numeric" });
}
function fmtFull(key){
  const d = new Date(key + "T00:00:00");
  return d.toLocaleDateString(undefined,{ weekday:"long", year:"numeric", month:"long", day:"numeric" });
}
function daysSince(dateStr){
  if(!dateStr) return 0;
  const a = new Date(dateStr + "T00:00:00"), b = new Date(todayKey()+"T00:00:00");
  return Math.max(0, Math.round((b-a)/86400000));
}
function lastNDates(n){
  const out=[]; for(let i=n-1;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); out.push(todayKey(d)); }
  return out;
}
function round1(n){ return Math.round(n*10)/10; }

/* ---------- Derived calculations ---------- */
function recoveryPhase(){
  const wks = daysSince(DATA.profile.babyBirthDate)/7;
  if(wks < 6) return PHASES[0];
  if(wks < 12) return PHASES[1];
  if(wks < 26) return PHASES[2];
  return PHASES[3];
}
function calorieGoal(){
  const base = { sedentary:1500, light:1650, active:1800, very:1900 };
  let cal = base[DATA.profile.activityLevel] || 1650;
  if(DATA.profile.isBreastfeeding === "yes") cal += 400;
  else if(DATA.profile.isBreastfeeding === "sometimes") cal += 200;
  return cal;
}
function waterGoal(){ return DATA.profile.isBreastfeeding === "no" ? 8 : 10; }
function unit(){ return DATA.profile.unit; }
function mUnit(){ return DATA.profile.measureUnit; }

function currentWeight(){
  if(!DATA.weights.length) return DATA.profile.startWeight;
  const sorted=[...DATA.weights].sort((a,b)=>a.date.localeCompare(b.date));
  return sorted[sorted.length-1].weight;
}
function weightLost(){
  const cur=currentWeight(), st=DATA.profile.startWeight;
  if(cur==null||st==null) return 0;
  return round1(st-cur);
}
function dayMeals(key){
  if(!DATA.meals[key]) DATA.meals[key]={ breakfast:[],lunch:[],dinner:[],snacks:[],water:0 };
  return DATA.meals[key];
}
function caloriesConsumed(key){
  const m=DATA.meals[key]; if(!m) return 0;
  return ["breakfast","lunch","dinner","snacks"].reduce((s,slot)=>
    s + (m[slot]||[]).reduce((t,i)=>t+(+i.cal||0),0),0);
}
function macroTotals(key){
  const m=DATA.meals[key]; const out={p:0,c:0,f:0};
  if(!m) return out;
  ["breakfast","lunch","dinner","snacks"].forEach(slot=>(m[slot]||[]).forEach(i=>{
    out.p+=+i.p||0; out.c+=+i.c||0; out.f+=+i.f||0;
  }));
  return out;
}
function stepsToday(){
  return (DATA.steps && DATA.steps[todayKey()]) || 0;
}

/* ---------- DOM helpers ---------- */
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function icons(){ if(window.lucide) lucide.createIcons(); }

/* ---------- Toasts ---------- */
function toast(msg, type="success"){
  const wrap=$("#toastWrap");
  const ic = type==="pink"?"🎉":type==="orange"?"⚠️":"✅";
  const el=document.createElement("div");
  el.className="toast "+(type==="pink"?"pink":type==="orange"?"orange":"");
  el.innerHTML=`<span class="t-ico">${ic}</span><span>${esc(msg)}</span>`;
  wrap.appendChild(el);
  setTimeout(()=>{ el.classList.add("out"); setTimeout(()=>el.remove(),300); }, 3000);
}

/* ---------- Undoable soft-delete ---------- */
let _undoBuffer = null;
let _undoTimer = null;
function undoableDelete(label, restoreFn){
  if(_undoTimer) clearTimeout(_undoTimer);
  const old=document.getElementById("undoToast"); if(old) old.remove();
  _undoBuffer=restoreFn;
  const wrap=$("#toastWrap");
  const el=document.createElement("div");
  el.className="toast orange";
  el.id="undoToast";
  el.innerHTML=`<span class="t-ico">🗑️</span>
    <span>${esc(label)} deleted</span>
    <button onclick="undoDelete()" style="margin-left:8px;background:rgba(255,255,255,0.25);border:none;padding:4px 10px;border-radius:8px;font-weight:700;cursor:pointer;font-size:.82rem;color:inherit">UNDO</button>`;
  wrap.appendChild(el);
  _undoTimer=setTimeout(()=>{ el.classList.add("out"); setTimeout(()=>el.remove(),300); _undoBuffer=null; },4000);
}
function undoDelete(){
  if(_undoBuffer){ _undoBuffer(); _undoBuffer=null; }
  if(_undoTimer) clearTimeout(_undoTimer);
  const el=document.getElementById("undoToast");
  if(el){ el.classList.add("out"); setTimeout(()=>el.remove(),300); }
  toast("Restored ✅");
}

/* ---------- Modal ---------- */
function openModal(title, bodyHTML){
  const m=$("#modal");
  m.innerHTML=`<div class="modal-grab"></div>
    <div class="modal-head"><h3>${esc(title)}</h3>
    <button class="icon-btn" onclick="closeModal()"><i data-lucide="x"></i></button></div>
    <div id="modalBody">${bodyHTML}</div>`;
  $("#modalOverlay").classList.add("open");
  icons();
}
function closeModal(){ $("#modalOverlay").classList.remove("open"); }
$("#modalOverlay").addEventListener("click",e=>{ if(e.target.id==="modalOverlay") closeModal(); });

/* ---------- Theme ---------- */
function applyTheme(){
  document.documentElement.setAttribute("data-theme", DATA.theme);
  const btn=$("#themeToggle");
  if(btn){ btn.innerHTML = `<i data-lucide="${DATA.theme==="dark"?"sun":"moon"}"></i>`; icons(); }
}
function toggleTheme(){ DATA.theme = DATA.theme==="dark"?"light":"dark"; save(); applyTheme(); refreshCharts(); }

/* ---------- Navigation ---------- */
const NAV = [
  { id:"home", label:"Home", icon:"home" },
  { id:"weight", label:"Weight", icon:"scale" },
  { id:"nutrition", label:"Nutrition", icon:"utensils" },
  { id:"fitness", label:"Fitness", icon:"dumbbell" },
  { id:"wellness", label:"Wellness", icon:"smile" }
];
let currentTab = "home";
function buildNav(){
  const itemHTML = NAV.map(n=>`
    <button class="nav-item ${n.id===currentTab?"active":""}" data-tab="${n.id}">
      <span class="nav-icon"><i data-lucide="${n.icon}"></i></span>
      <span>${n.label}</span>
    </button>`).join("");
  $("#bottomNav").innerHTML = itemHTML;
  $("#sideNav").innerHTML = itemHTML;
  $$(".nav-item").forEach(b=>b.addEventListener("click",()=>goTab(b.dataset.tab)));
  icons();
}
function goTab(id){
  currentTab=id;
  $$(".nav-item").forEach(b=>b.classList.toggle("active", b.dataset.tab===id));
  $$(".screen").forEach(s=>s.classList.remove("active"));
  const scr=$("#screen-"+id); scr.classList.add("active");
  renderScreen(id);
  window.scrollTo({top:0,behavior:"smooth"});
}
function renderScreen(id){
  if(id==="home") renderHome();
  else if(id==="weight") renderWeight();
  else if(id==="nutrition") renderNutrition();
  else if(id==="fitness") renderFitness();
  else if(id==="wellness") renderWellness();
}

/* ---------- Chart registry ---------- */
const CHARTS = {};
function makeChart(id, config){
  const el=document.getElementById(id);
  if(!el || !window.Chart) return;
  if(CHARTS[id]){ CHARTS[id].destroy(); }
  const cs=getComputedStyle(document.documentElement);
  Chart.defaults.font.family="'Plus Jakarta Sans',sans-serif";
  Chart.defaults.color = cs.getPropertyValue("--text-soft").trim();
  CHARTS[id]=new Chart(el, config);
}
function refreshCharts(){ renderScreen(currentTab); }
function cssVar(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

/* ---------- Progress ring (SVG) ---------- */
function ring(pct, color){
  pct=Math.max(0,Math.min(100,pct));
  const r=36, c=2*Math.PI*r, off=c-(pct/100)*c;
  return `<svg width="84" height="84" viewBox="0 0 84 84">
    <circle cx="42" cy="42" r="${r}" fill="none" stroke="var(--ring-track)" stroke-width="9"/>
    <circle cx="42" cy="42" r="${r}" fill="none" stroke="${color}" stroke-width="9"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"
      style="transition:stroke-dashoffset .6s ease"/>
  </svg>`;
}
function emptyState(icon, msg){
  return `<div class="empty"><div class="e-ico">${icon}</div><p>${esc(msg)}</p></div>`;
}

/* ============================================================
   SCREEN 1 — DASHBOARD
   ============================================================ */
function greeting(){
  const h=new Date().getHours();
  if(h<12) return "Good morning";
  if(h<18) return "Good afternoon";
  return "Good evening";
}
function rotating(arr, salt=0){
  const idx=(Math.floor(Date.now()/86400000)+salt) % arr.length;
  return arr[idx];
}
function loggedThisWeek(){
  const dates=lastNDates(7);
  return dates.map(d=>{
    const logged = DATA.weights.some(w=>w.date===d) ||
      DATA.meals[d] || DATA.activities.some(a=>a.date===d) ||
      DATA.mood.some(m=>m.date===d) || DATA.sleep.some(s=>s.date===d);
    return { date:d, on:!!logged };
  });
}

function weightChartEmpty(canvasId){
  const el=document.getElementById(canvasId);
  if(!el) return;
  if(CHARTS[canvasId]){ CHARTS[canvasId].destroy(); delete CHARTS[canvasId]; }
  const box=el.closest(".chart-box");
  if(box) box.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:var(--text-soft);font-size:.85rem;text-align:center;padding:20px"><span style="font-size:2rem">📈</span><span>Log your weight a couple of times<br>to see your progress chart here.</span></div>`;
}
function drawHomeWeightChart(){
  if(DATA.weights.length<2){ weightChartEmpty("homeWeightChart"); return; }
  const dates=lastNDates(7);
  const map={}; DATA.weights.forEach(w=>map[w.date]=w.weight);
  let last=null;
  const data=dates.map(d=>{ if(map[d]!=null) last=map[d]; return map[d]??last; });
  makeChart("homeWeightChart",{
    type:"line",
    data:{ labels:dates.map(fmtDate), datasets:[{
      data, borderColor:cssVar("--primary"), backgroundColor:"rgba(249,168,201,.15)",
      fill:true, tension:.4, pointRadius:3, pointBackgroundColor:cssVar("--primary"), spanGaps:true }]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{ x:{ grid:{display:false} }, y:{ grid:{color:cssVar("--border")}, ticks:{maxTicksLimit:4} } } }
  });
}

/* ---------- Shared quick-log: mood ---------- */
function logMoodQuick(v){
  const tk=todayKey();
  let m=DATA.mood.find(x=>x.date===tk);
  if(m) m.mood=v;
  else DATA.mood.push({ date:tk, mood:v, energy:5, stress:5, anxiety:false, notes:"" });
  save(); checkAchievements();
  toast("Mood logged "+MOODS.find(m=>m.v===v).e+" — tap Wellness for full check-in 💕");
  document.querySelectorAll('[data-tab="wellness"]').forEach(wellBtn=>{
    wellBtn.classList.add("nav-pulse"); setTimeout(()=>wellBtn.classList.remove("nav-pulse"),2000);
  });
  renderScreen(currentTab);
}

            <div class="lr-main">${esc(v)}</div>

    <div class="section-head"><h2>Weight Tracker</h2></div>

      <div style="text-align:center;margin-bottom:6px">
        <div class="big-weight">${cur??"—"}<small> ${unit()}</small></div>
        <div class="muted" style="font-size:.85rem">current weight</div>

        <div class="card-title" style="margin:0"><i data-lucide="trending-down"></i> Trend</div>

function milestoneTimeline(){
  const wks=daysSince(DATA.profile.babyBirthDate)/7;
  const reached = DATA.profile.goalWeight!=null && currentWeight()!=null && currentWeight()<=DATA.profile.goalWeight;
  const ms=[
    { t:"6-Week Checkup", s:"Doctor clearance milestone", done:wks>=6, w:6 },
    { t:"3 Months", s:"Building strength", done:wks>=12, w:12 },
    { t:"6 Months", s:"Halfway healing", done:wks>=26, w:26 },
    { t:"Goal Reached", s:"Your target weight", done:reached, w:999 }
  ];
  // current = first not-done
  let curIdx = ms.findIndex(m=>!m.done);
  return `<div class="timeline">${ms.map((m,i)=>`
    <div class="tl-item ${m.done?"done":""} ${i===curIdx?"current":""}">
      <div class="tl-dot"><i data-lucide="${m.done?"check":"circle"}"></i></div>
      <div class="tl-title">${m.t}</div><div class="tl-sub">${m.s}</div>
    </div>`).join("")}</div>`;
}

function setWRange(n){ weightRange=n; renderWeight(); }
function setUnit(u){ DATA.profile.unit=u; save(); renderWeight(); }
function drawWeightChart(){
  if(DATA.weights.length<2){ weightChartEmpty("weightChart"); return; }
  let entries=[...DATA.weights].sort((a,b)=>a.date.localeCompare(b.date));
  if(weightRange){ const cut=lastNDates(weightRange)[0]; entries=entries.filter(e=>e.date>=cut); }
  const labels=entries.map(e=>fmtDate(e.date));
  const vals=entries.map(e=>e.weight);
  const goal=DATA.profile.goalWeight;
  const ds=[{ label:"Weight", data:vals, borderColor:cssVar("--primary"),
    backgroundColor:"rgba(249,168,201,.15)", fill:true, tension:.4, pointRadius:3, pointBackgroundColor:cssVar("--primary") }];
  if(goal!=null) ds.push({ label:"Goal", data:labels.map(()=>goal), borderColor:cssVar("--secondary"),
    borderDash:[6,6], pointRadius:0, fill:false, tension:0 });
  makeChart("weightChart",{
    type:"line", data:{ labels, datasets:ds },
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:true,labels:{usePointStyle:true,boxWidth:8}} },
      scales:{ x:{grid:{display:false}}, y:{grid:{color:cssVar("--border")}} } }
  });
}
function saveWeightFromForm(){
  const v=parseFloat($("#wVal").value);
  if(isNaN(v)){ toast("Enter a weight 🌸","orange"); return; }
  const date=$("#wDate").value||todayKey(), notes=$("#wNotes").value.trim();
  const ex=DATA.weights.find(w=>w.date===date);
  if(ex){ ex.weight=v; ex.notes=notes; } else DATA.weights.push({date,weight:v,notes});
  if(DATA.profile.startWeight==null) DATA.profile.startWeight=v;
  save(); checkAchievements(); toast("Weight logged ⚖️"); renderWeight();
}
function delWeight(date){
  const i=DATA.weights.findIndex(w=>w.date===date);
  if(i<0) return;

function pelvicStreakCount(){
  let c=0; for(let i=0;;i++){ const d=new Date(); d.setDate(d.getDate()-i);
    if(DATA.pelvicLog.includes(todayKey(d))) c++; else break; }
  return c;
}
function bestPelvicStreak(){
  if(!DATA.pelvicLog.length) return 0;
  const sorted = [...DATA.pelvicLog].sort();
  let best = 1, cur = 1;
  for(let i = 1; i < sorted.length; i++){
    const a = new Date(sorted[i-1]+"T00:00:00");
    const b = new Date(sorted[i]+"T00:00:00");
    const diff = Math.round((b - a) / 86400000);
    if(diff === 1){ cur++; best = Math.max(best, cur); }
    else cur = 1;
  }
  return best;
}

function calcSleepPreview(){
  const bed = document.getElementById("sleepBed")?.value;
  const wake = document.getElementById("sleepWake")?.value;
  const preview = document.getElementById("sleepTotalPreview");
  const hrsEl = document.getElementById("sleepTotalHrs");
  if(!bed || !wake || !preview || !hrsEl) return;
  const [bh, bm] = bed.split(":").map(Number);
  const [wh, wm] = wake.split(":").map(Number);
  let bedMins  = bh * 60 + bm;
  let wakeMins = wh * 60 + wm;
  if(wakeMins <= bedMins) wakeMins += 24 * 60;
  const totalMins = wakeMins - bedMins;
  const hours = Math.floor(totalMins / 60);
  const mins  = totalMins % 60;
  const total = Math.round(totalMins / 60 * 10) / 10;
  hrsEl.textContent = hours + "h " + (mins > 0 ? mins + "m" : "");
  preview.style.display = "block";
  preview.style.background = total >= 7
    ? "var(--secondary-soft)"
    : total >= 5
      ? "var(--accent)"
      : "rgba(224,112,112,0.1)";
  preview.dataset.total = total;
}
let sleepStars=3;
function setSleepStars(n){ sleepStars=n; $$("#slStars .star").forEach(s=>s.classList.toggle("on",+s.dataset.n<=n)); }
function calcSleepHours(bed,wake,nap){
  const [bh,bm]=bed.split(":").map(Number),[wh,wm]=wake.split(":").map(Number);
  let mins=(wh*60+wm)-(bh*60+bm); if(mins<=0) mins+=1440;
  mins+=(+nap||0);
  return round1(mins/60);
}
function saveSleep(){
  const bed=$("#sleepBed").value, wake=$("#sleepWake").value;
  const wakings=+document.getElementById("slWake#").value;
  const nap=+$("#slNap").value||0;
  const preview = document.getElementById("sleepTotalPreview");
  const total = preview?.dataset.total
    ? parseFloat(preview.dataset.total)
    : calcSleepHours(bed,wake,0);
  const tk=todayKey();
  const entry={ date:tk, bedtime:bed, wakeTime:wake, wakings, quality:sleepStars, nap, total };
  const ex=DATA.sleep.find(s=>s.date===tk);

}
function delSleep(date){ DATA.sleep=DATA.sleep.filter(s=>s.date!==date); save(); renderSleepTab(); }

/* ============================================================

   ============================================================ */
function unlock(key){
  if(DATA.achievements[key]) return;
  DATA.achievements[key]=true;
  DATA.achievementDates[key]=todayKey();
  const def=ACHIEVEMENT_DEFS.find(a=>a.key===key);
  toast(`Achievement Unlocked: ${def.name}! ${def.icon}`,"pink");
}
function loggingStreak(){
  let c=0; for(let i=0;;i++){ const d=new Date(); d.setDate(d.getDate()-i); const k=todayKey(d);
    const any=DATA.weights.some(w=>w.date===k)||DATA.meals[k]||DATA.activities.some(a=>a.date===k)||
      DATA.mood.some(m=>m.date===k)||DATA.sleep.some(s=>s.date===k);
    if(any) c++; else break; }
  return c;
}
function waterGoalDays(){
  const g=waterGoal();
  return Object.values(DATA.meals).filter(m=>(m.water||0)>=g).length;
}
function checkAchievements(){
  const anyLog = DATA.weights.length||Object.keys(DATA.meals).length||DATA.activities.length||
    DATA.mood.length||DATA.sleep.length||DATA.measurements.length||DATA.journal.some(j=>j.gratitude.some(x=>x));
  if(anyLog) unlock("firstLog");
  if(waterGoalDays()>=7) unlock("hydrationHero");
  if(weightLost()>=1) unlock("firstKilo");
  const streak=loggingStreak();
  if(streak>=7) unlock("weekWarrior");
  if(streak>=30) unlock("monthStrong");
  const p=DATA.profile, cur=currentWeight();
  if(p.startWeight!=null&&p.goalWeight!=null&&cur!=null&&p.startWeight!==p.goalWeight){
    const prog=(p.startWeight-cur)/(p.startWeight-p.goalWeight);
    if(prog>=0.5) unlock("halfwayThere");
    if(cur<=p.goalWeight) unlock("goalReached");
  }
  save();
}

function saveSettings(){
  const p=DATA.profile;
  p.name=$("#setName").value.trim();
  p.babyBirthDate=$("#setBirth").value;
  p.isBreastfeeding=$("#setBF").value;
  p.unit=$("#setUnit").value;
  p.measureUnit=$("#setMUnit").value;
  p.startWeight=$("#setStart").value===""?null:+$("#setStart").value;
  p.goalWeight=$("#setGoal").value===""?null:+$("#setGoal").value;
  p.activityLevel=$("#setAct").value;
  p.reminderTime=$("#setReminder").value;
  save(); checkAchievements();
  if(p.reminderTime){ requestReminder(); scheduleReminder(p.reminderTime); }
  closeModal(); toast("Settings saved 💕"); renderScreen(currentTab);

function requestReminder(){
  if(!("Notification" in window)) return;
  if(Notification.permission==="default") Notification.requestPermission();
}
function scheduleReminder(timeStr){
  if(!timeStr) return;
  if(!("Notification" in window)) return;
  if(window._reminderInterval) clearInterval(window._reminderInterval);
  window._reminderInterval=setInterval(()=>{
    const now=new Date();
    const current=now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0");
    if(current===timeStr){
      const today=todayKey();
      const hasLogged=DATA.weights.some(w=>w.date===today)||
        DATA.mood.some(m=>m.date===today)||
        DATA.activities.some(a=>a.date===today);
      if(!hasLogged && Notification.permission==="granted"){
        new Notification("Mama Reset 🌸",{ body:"Don't forget to log today! Every entry counts. 💕", icon:"" });
      }
    }
  },60000);
}
function exportData(){
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="mama-reset-data.json"; a.click();
  URL.revokeObjectURL(url);
  toast("Data exported 📁");
}

}

function obSet(k,v,btn){
  obDraft[k]=v;
  if(btn){ const sib=btn.parentElement.querySelectorAll("button"); sib.forEach(b=>b.classList.toggle("active",b===btn)); }
}
function obCommitStep(){
  if(obStep===1){ obDraft.name=$("#obName")?.value.trim()||obDraft.name; obDraft.babyBirthDate=$("#obBirth")?.value||obDraft.babyBirthDate; }
  if(obStep===2){ const s=$("#obStart")?.value, g=$("#obGoal")?.value;
    obDraft.startWeight=s===""||s==null?obDraft.startWeight:+s; obDraft.goalWeight=g===""||g==null?obDraft.goalWeight:+g; }
  if(obStep===3){ obDraft.activityLevel=$("#obAct")?.value||obDraft.activityLevel; obDraft.currentEnergy=+($("#obEnergy")?.value||obDraft.currentEnergy); }
}
function obNext(){
  obCommitStep();

  // --- Validate Step 1 (About You) ---
  if(obStep === 1){
    const birthVal = $("#obBirth")?.value;
    const birthErr = $("#errBirth");
    const birthInp = $("#obBirth");
    if(birthErr) birthErr.classList.remove("show");
    if(birthInp) birthInp.classList.remove("ob-invalid");
    let hasError = false;
    if(!birthVal){
      if(birthErr) birthErr.classList.add("show");
      if(birthInp) birthInp.classList.add("ob-invalid");
      birthInp?.scrollIntoView({ behavior:"smooth", block:"center" });
      hasError = true;
    }
    if(hasError) return;
  }

  // --- Validate Step 2 (Your Goals) ---
  if(obStep === 2){
    const startVal = $("#obStart")?.value;
    const goalVal  = $("#obGoal")?.value;
    const startErr = $("#errStart");
    const goalErr  = $("#errGoal");
    const startInp = $("#obStart");
    const goalInp  = $("#obGoal");
    [startErr, goalErr].forEach(e => e?.classList.remove("show"));
    [startInp, goalInp].forEach(i => i?.classList.remove("ob-invalid"));
    let hasError = false;
    if(!startVal || isNaN(parseFloat(startVal)) || parseFloat(startVal) <= 0){
      startErr?.classList.add("show");
      startInp?.classList.add("ob-invalid");
      hasError = true;
    }
    if(!goalVal || isNaN(parseFloat(goalVal)) || parseFloat(goalVal) <= 0){
      goalErr?.classList.add("show");
      goalInp?.classList.add("ob-invalid");
      hasError = true;
    }
    if(!hasError){
      const sw = parseFloat(startVal);
      const gw = parseFloat(goalVal);
      if(gw >= sw){
        toast("Tip: goal weight is usually less than current weight 💕","orange");
      }
    }
    if(hasError){
      (startInp || goalInp)?.scrollIntoView({ behavior:"smooth", block:"center" });
      return;
    }
  }

  // Step 3 (Activity Level) — no required fields
  if(obStep < 4){ obStep++; renderOnboard(); }
}
function obBack(){ obCommitStep(); if(obStep>0){ obStep--; renderOnboard(); } }
function finishOnboarding(){
  // Safety net check
  if(!obDraft.babyBirthDate){
    obStep = 1;
    renderOnboard();
    toast("Please add your baby's birth date to continue 💕","orange");
    return;
  }
  if(!obDraft.startWeight || !obDraft.goalWeight){
    obStep = 2;
    renderOnboard();
    toast("Please add your weight details to continue ⚖️","orange");
    return;
  }

  Object.assign(DATA.profile, obDraft, { measureUnit:"cm", setupComplete:true });
  if(DATA.profile.babyBirthDate==="") DATA.profile.babyBirthDate=todayKey();
  save(); checkAchievements();
  $("#onboard").classList.remove("open");
  bootApp();
  toast("Welcome to your journey, "+(DATA.profile.name||"mama")+"! 🌸","pink");
}

<!-- ===== PWA: service worker + install banner ===== -->
<script>
(function(){
  "use strict";

  // Register the service worker (enables offline use + installability).
  if("serviceWorker" in navigator){
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("sw.js").catch(function(err){
        console.warn("SW registration failed:", err);
      });
    });
  }

  var deferredPrompt = null;
  var installBtn  = document.getElementById("installBtn");
  var banner      = document.getElementById("installBanner");
  var ibInstall   = document.getElementById("ibInstall");
  var ibClose     = document.getElementById("ibClose");
  var ibSub       = document.getElementById("ibSub");
  var ua = navigator.userAgent || "";
  var isIos = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  var DISMISS_KEY = "mr_installDismissed";
  var DISMISS_DAYS = 5;

  function isStandalone(){
    return window.matchMedia("(display-mode: standalone)").matches ||
           window.navigator.standalone === true;
  }
  function dismissedRecently(){
    try{
      var t = +localStorage.getItem(DISMISS_KEY) || 0;
      return (Date.now() - t) < DISMISS_DAYS*86400000;
    }catch(e){ return false; }
  }
  function showBanner(){
    if(!banner || isStandalone() || dismissedRecently()) return;
    if(isIos && ibSub) ibSub.textContent = "Tap Install for quick Home-Screen steps 🌸";
    banner.classList.add("show");
    if(installBtn) installBtn.style.display = "grid";
  }
  function hideBanner(){ if(banner) banner.classList.remove("show"); }

  function showIosInstructions(){
    if(typeof openModal !== "function") return;
    openModal("Install Mama Reset 🌸", `
      <p style="margin-bottom:14px">Add the app to your Home Screen for a full-screen, offline experience:</p>
      <ol style="margin:0 0 8px 18px;line-height:1.9;font-size:.92rem">
        <li>Tap the <b>Share</b> button <span style="white-space:nowrap">(the square with an arrow ⬆️)</span></li>
        <li>Scroll and tap <b>“Add to Home Screen”</b></li>
        <li>Tap <b>Add</b> — done! 💕</li>
      </ol>`);
  }

  // Chrome / Edge / Android: fired when the app qualifies for install.
  window.addEventListener("beforeinstallprompt", function(e){
    e.preventDefault();
    deferredPrompt = e;
    showBanner();
  });

  async function doInstall(){
    if(deferredPrompt){
      hideBanner();
      deferredPrompt.prompt();
      try{ await deferredPrompt.userChoice; }catch(e){}
      deferredPrompt = null;
      if(installBtn) installBtn.style.display = "none";
    } else if(isIos){
      showIosInstructions();
    } else {
      if(typeof toast === "function") toast("Open Chrome's ⋮ menu and tap “Add to Home screen / Install app” 💕");
    }
  }

  if(ibInstall) ibInstall.addEventListener("click", doInstall);
  if(installBtn) installBtn.addEventListener("click", doInstall);
  if(ibClose) ibClose.addEventListener("click", function(){
    hideBanner();
    try{ localStorage.setItem(DISMISS_KEY, String(Date.now())); }catch(e){}
  });

  // iOS has no beforeinstallprompt — surface the banner ourselves.
  if(isIos && !isStandalone()){
    window.addEventListener("load", function(){ setTimeout(showBanner, 1200); });
  }

  window.addEventListener("appinstalled", function(){
    deferredPrompt = null;
    hideBanner();
    if(installBtn) installBtn.style.display = "none";
    try{ localStorage.removeItem(DISMISS_KEY); }catch(e){}
    if(typeof toast === "function") toast("Installed! Find Mama Reset on your home screen 🌸","pink");
  });
})();
</script>
</body>
</html>
